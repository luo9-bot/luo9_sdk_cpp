name: Build Static Libraries

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'

jobs:
  build-windows-mingw:
    name: Windows (MinGW-w64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: |
          mkdir build
          cd build
          cmake .. -G "MinGW Makefiles"
          cmake --build .

      - name: Package
        run: |
          New-Item -ItemType Directory -Force -Path release/luo9_sdk_cpp/include, release/luo9_sdk_cpp/lib/windows
          Copy-Item include/*.h release/luo9_sdk_cpp/include/
          Copy-Item build/libluo9_sdk_cpp.a release/luo9_sdk_cpp/lib/windows/
          Compress-Archive -Path release/luo9_sdk_cpp -DestinationPath release/luo9_sdk_cpp-windows-mingw.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: luo9_sdk_cpp-windows-mingw
          path: release/luo9_sdk_cpp-windows-mingw.zip

      - name: Upload lib for sync
        uses: actions/upload-artifact@v4
        with:
          name: windows-mingw-lib
          path: build/libluo9_sdk_cpp.a

  build-windows-msvc:
    name: Windows (MSVC)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Build
        run: |
          mkdir build
          cd build
          cmake .. -G Ninja
          cmake --build .

      - name: Package
        run: |
          New-Item -ItemType Directory -Force -Path release/luo9_sdk_cpp/include, release/luo9_sdk_cpp/lib/windows
          Copy-Item include/*.h release/luo9_sdk_cpp/include/
          Copy-Item build/luo9_sdk_cpp.lib release/luo9_sdk_cpp/lib/windows/
          Compress-Archive -Path release/luo9_sdk_cpp -DestinationPath release/luo9_sdk_cpp-windows-msvc.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: luo9_sdk_cpp-windows-msvc
          path: release/luo9_sdk_cpp-windows-msvc.zip

      - name: Upload lib for sync
        uses: actions/upload-artifact@v4
        with:
          name: windows-msvc-lib
          path: build/luo9_sdk_cpp.lib

  build-linux:
    name: Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y g++ cmake

      - name: Build
        run: |
          mkdir build
          cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release
          make -j$(nproc)

      - name: Package
        run: |
          mkdir -p release/luo9_sdk_cpp/include release/luo9_sdk_cpp/lib/linux
          cp include/*.h release/luo9_sdk_cpp/include/
          cp build/libluo9_sdk_cpp.a release/luo9_sdk_cpp/lib/linux/
          cd release && zip -r luo9_sdk_cpp-linux.zip luo9_sdk_cpp/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: luo9_sdk_cpp-linux
          path: release/luo9_sdk_cpp-linux.zip

      - name: Upload lib for sync
        uses: actions/upload-artifact@v4
        with:
          name: linux-lib
          path: build/libluo9_sdk_cpp.a

  release:
    name: Create Release
    needs: [build-windows-mingw, build-windows-msvc, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.zip
          generate_release_notes: true
          prerelease: ${{ contains(github.ref, 'beta') || contains(github.ref, 'alpha') || contains(github.ref, 'pre') }}

  sync:
    name: Sync SDK to Plugin Example
    needs: [build-windows-mingw, build-windows-msvc, build-linux]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - name: Checkout luo9_sdk_cpp
        uses: actions/checkout@v4
        with:
          path: sdk_cpp

      - name: Download all libs
        uses: actions/download-artifact@v4
        with:
          path: sdk_libs

      - name: Checkout plugin-cpp-example
        uses: actions/checkout@v4
        with:
          repository: luo9-bot/plugin-cpp-example
          token: ${{ secrets.BOT_SDK_DISTRIBUTION_TOKEN }}
          path: plugin-example

      - name: Sync SDK files
        run: |
          echo "=== Before sync ==="
          ls -la plugin-example/sdk/ 2>/dev/null || echo "sdk dir not exist"

          # Prepare SDK directory structure
          mkdir -p plugin-example/sdk/include
          mkdir -p plugin-example/sdk/lib/windows
          mkdir -p plugin-example/sdk/lib/linux

          # Copy headers
          cp -f sdk_cpp/include/*.h plugin-example/sdk/include/

          # Copy libs from artifacts
          cp -f sdk_libs/windows-mingw-lib/libluo9_sdk_cpp.a plugin-example/sdk/lib/windows/libluo9_sdk_cpp_mingw.a
          cp -f sdk_libs/windows-msvc-lib/luo9_sdk_cpp.lib plugin-example/sdk/lib/windows/luo9_sdk_cpp.lib
          cp -f sdk_libs/linux-lib/libluo9_sdk_cpp.a plugin-example/sdk/lib/linux/libluo9_sdk_cpp.a

          echo "=== After sync ==="
          ls -la plugin-example/sdk/
          echo ""
          echo "=== SDK lib files ==="
          ls -la plugin-example/sdk/lib/windows/
          ls -la plugin-example/sdk/lib/linux/

      - name: Check for changes
        id: check_changes
        run: |
          cd plugin-example
          if [[ -n $(git status -s) ]]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "Changes detected:"
            git status -s
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No changes detected"
          fi

      - name: Commit and push changes
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          cd plugin-example
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sdk/
          git commit -m "chore: sync SDK from luo9_sdk_cpp
          - Source: luo9-bot/luo9_sdk_cpp@${{ github.sha }}
          - Update timestamp: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          git push

          echo "Synced to plugin-cpp-example successfully!"

      - name: Sync summary
        if: always()
        run: |
          echo "=========================================="
          if [ "${{ steps.check_changes.outputs.has_changes }}" = "true" ]; then
            echo "SDK sync completed and pushed!"
          else
            echo "No changes detected, nothing to sync"
          fi
          echo "Source: luo9-bot/luo9_sdk_cpp"
          echo "Target: luo9-bot/plugin-cpp-example/sdk"
          echo "Time: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "=========================================="
