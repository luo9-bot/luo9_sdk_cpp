name: Build Static Libraries

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'include/**'
      - 'src/**'
      - 'CMakeLists.txt'
  pull_request:
    branches: [ main ]

jobs:
  build-windows-mingw:
    name: Windows (MinGW-w64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup MinGW-w64
        uses: egor-tensin/setup-mingw@v2
        with:
          platform: x64
          cc: '1'

      - name: Build
        run: |
          mkdir build
          cd build
          cmake .. -G "MinGW Makefiles"
          cmake --build .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: luo9_sdk_cpp-windows-mingw
          path: |
            build/libluo9_sdk_cpp.a
            include/*.h

  build-windows-msvc:
    name: Windows (MSVC)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Build
        run: |
          mkdir build
          cd build
          cmake .. -G Ninja
          cmake --build .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: luo9_sdk_cpp-windows-msvc
          path: |
            build/luo9_sdk_cpp.lib
            include/*.h

  build-linux:
    name: Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y g++ cmake

      - name: Build
        run: |
          mkdir build
          cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release
          make -j$(nproc)

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: luo9_sdk_cpp-linux
          path: |
            build/libluo9_sdk_cpp.a
            include/*.h
