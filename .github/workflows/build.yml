name: Build Static Libraries

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-windows-mingw:
    name: Windows (MinGW-w64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: |
          mkdir build
          cd build
          cmake .. -G "MinGW Makefiles"
          cmake --build .

      - name: Package
        run: |
          mkdir -p release/luo9_sdk_cpp/include release/luo9_sdk_cpp/lib/windows
          cp include/*.h release/luo9_sdk_cpp/include/
          cp build/libluo9_sdk_cpp.a release/luo9_sdk_cpp/lib/windows/
          cd release && 7z a luo9_sdk_cpp-windows-mingw.zip luo9_sdk_cpp/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: luo9_sdk_cpp-windows-mingw
          path: release/luo9_sdk_cpp-windows-mingw.zip

  build-windows-msvc:
    name: Windows (MSVC)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Build
        run: |
          mkdir build
          cd build
          cmake .. -G Ninja
          cmake --build .

      - name: Package
        run: |
          mkdir -p release/luo9_sdk_cpp/include release/luo9_sdk_cpp/lib/windows
          cp include/*.h release/luo9_sdk_cpp/include/
          cp build/luo9_sdk_cpp.lib release/luo9_sdk_cpp/lib/windows/
          cd release && 7z a luo9_sdk_cpp-windows-msvc.zip luo9_sdk_cpp/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: luo9_sdk_cpp-windows-msvc
          path: release/luo9_sdk_cpp-windows-msvc.zip

  build-linux:
    name: Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y g++ cmake

      - name: Build
        run: |
          mkdir build
          cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release
          make -j$(nproc)

      - name: Package
        run: |
          mkdir -p release/luo9_sdk_cpp/include release/luo9_sdk_cpp/lib/linux
          cp include/*.h release/luo9_sdk_cpp/include/
          cp build/libluo9_sdk_cpp.a release/luo9_sdk_cpp/lib/linux/
          cd release && zip -r luo9_sdk_cpp-linux.zip luo9_sdk_cpp/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: luo9_sdk_cpp-linux
          path: release/luo9_sdk_cpp-linux.zip

  release:
    name: Create Release
    needs: [build-windows-mingw, build-windows-msvc, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.zip
          generate_release_notes: true
          prerelease: ${{ contains(github.ref, 'beta') || contains(github.ref, 'alpha') || contains(github.ref, 'pre') }}
