name: Sync SDK Manual

on:
  workflow_dispatch:

jobs:
  build-windows-mingw:
    name: Windows (MinGW-w64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: |
          mkdir build
          cd build
          cmake .. -G "MinGW Makefiles"
          cmake --build .

      - name: Upload lib
        uses: actions/upload-artifact@v4
        with:
          name: windows-mingw-lib
          path: build/libluo9_sdk_cpp.a

  build-windows-msvc:
    name: Windows (MSVC)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Build
        run: |
          mkdir build
          cd build
          cmake .. -G Ninja
          cmake --build .

      - name: Upload lib
        uses: actions/upload-artifact@v4
        with:
          name: windows-msvc-lib
          path: build/luo9_sdk_cpp.lib

  build-linux:
    name: Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y g++ cmake

      - name: Build
        run: |
          mkdir build
          cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release
          make -j$(nproc)

      - name: Upload lib
        uses: actions/upload-artifact@v4
        with:
          name: linux-lib
          path: build/libluo9_sdk_cpp.a

  sync:
    name: Sync SDK to Plugin Example
    needs: [build-windows-mingw, build-windows-msvc, build-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout luo9_sdk_cpp
        uses: actions/checkout@v4
        with:
          path: sdk_cpp

      - name: Download all libs
        uses: actions/download-artifact@v4
        with:
          path: sdk_libs

      - name: Checkout plugin-cpp-example
        uses: actions/checkout@v4
        with:
          repository: luo9-bot/plugin-cpp-example
          token: ${{ secrets.BOT_SDK_DISTRIBUTION_TOKEN }}
          path: plugin-example

      - name: Sync SDK files
        run: |
          echo "=== Before sync ==="
          ls -la plugin-example/sdk/ 2>/dev/null || echo "sdk dir not exist"

          # Prepare SDK directory structure
          mkdir -p plugin-example/sdk/include
          mkdir -p plugin-example/sdk/lib/windows
          mkdir -p plugin-example/sdk/lib/linux

          # Copy headers
          cp -f sdk_cpp/include/*.h plugin-example/sdk/include/

          # Copy SDK libs from artifacts
          cp -f sdk_libs/windows-mingw-lib/libluo9_sdk_cpp.a plugin-example/sdk/lib/windows/libluo9_sdk_cpp_mingw.a
          cp -f sdk_libs/windows-msvc-lib/luo9_sdk_cpp.lib plugin-example/sdk/lib/windows/luo9_sdk_cpp.lib
          cp -f sdk_libs/linux-lib/libluo9_sdk_cpp.a plugin-example/sdk/lib/linux/libluo9_sdk_cpp.a

          # Copy core libs from source
          cp -f sdk_cpp/lib/windows/luo9_core.lib plugin-example/sdk/lib/windows/
          cp -f sdk_cpp/lib/windows/luo9_core.dll plugin-example/sdk/lib/windows/
          cp -f sdk_cpp/lib/linux/libluo9_core.so plugin-example/sdk/lib/linux/

          echo "=== After sync ==="
          ls -la plugin-example/sdk/
          echo ""
          echo "=== SDK lib files ==="
          ls -la plugin-example/sdk/lib/windows/
          ls -la plugin-example/sdk/lib/linux/

      - name: Check for changes
        id: check_changes
        run: |
          cd plugin-example
          if [[ -n $(git status -s) ]]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "Changes detected:"
            git status -s
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No changes detected"
          fi

      - name: Commit and push changes
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          cd plugin-example
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sdk/
          git commit -m "chore: sync SDK from luo9_sdk_cpp
          - Source: luo9-bot/luo9_sdk_cpp@${{ github.sha }}
          - Update timestamp: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          git push

          echo "Synced to plugin-cpp-example successfully!"

      - name: Sync summary
        if: always()
        run: |
          echo "=========================================="
          if [ "${{ steps.check_changes.outputs.has_changes }}" = "true" ]; then
            echo "SDK sync completed and pushed!"
          else
            echo "No changes detected, nothing to sync"
          fi
          echo "Source: luo9-bot/luo9_sdk_cpp"
          echo "Target: luo9-bot/plugin-cpp-example/sdk"
          echo "Time: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "=========================================="
